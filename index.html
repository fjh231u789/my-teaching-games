<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超級文字大冒險：生字英雄榜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f9ff; touch-action: manipulation; }
        .hidden { display: none; }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .drop-zone { display: inline-flex; width: 65px; height: 65px; border: 3px dashed #94a3b8; border-radius: 12px; vertical-align: middle; justify-content: center; align-items: center; margin: 0 4px; background-color: #ffffff; font-weight: bold; font-size: 1.8rem; transition: all 0.3s; }
        .drop-zone.filled { border-style: solid; border-color: #3b82f6; color: #1e3a8a; }
        .drop-zone.correct-border { border-color: #10b981 !important; background-color: #f0fdf4; color: #10b981 !important; }
        .drop-zone.wrong-border { border-color: #ef4444 !important; background-color: #fef2f2; color: #ef4444 !important; }
        .option-card { touch-action: none; user-select: none; transition: all 0.2s; cursor: grab; }
        .radical-icon { display: inline-block; margin-left: 6px; font-size: 1.2rem; background: #f1f5f9; padding: 2px 6px; border-radius: 8px; color: #4338ca; }
        .rank-badge { width: 30px; height: 30px; display: flex; items-center: center; justify-content: center; border-radius: 50%; font-weight: bold; margin-right: 10px; }
    </style>
</head>
<body class="p-2 md:p-6" ondragover="event.preventDefault()">
    <div id="app-container" class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-indigo-200">
        <!-- 登入畫面 -->
        <div id="login-screen" class="p-8 text-center">
            <div class="mb-4 inline-block p-6 bg-yellow-100 rounded-full text-6xl shadow-inner">⚔️</div>
            <h1 class="text-4xl font-black text-indigo-700 mb-2">超級文字大冒險</h1>
            <p class="text-slate-500 mb-8 text-xl font-bold">成為生字英雄吧！</p>
            <div class="max-w-md mx-auto bg-slate-50 p-8 rounded-3xl border-2 border-slate-200 shadow-sm mb-8">
                <label class="block text-slate-700 font-bold mb-4 text-lg">輸入英雄稱號：</label>
                <input type="text" id="player-name" placeholder="英雄的名字..." class="w-full px-6 py-4 border-2 border-indigo-200 rounded-2xl mb-6 text-center text-slate-800 text-2xl outline-none transition-all">
                <button onclick="startGame()" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl text-2xl shadow-[0_6px_0_0_#4338ca] hover:translate-y-[4px] transition-all">開始冒險 ➔</button>
            </div>
        </div>

        <!-- 遊戲畫面 -->
        <div id="game-screen" class="hidden">
            <div class="bg-indigo-700 p-4 text-white flex justify-between items-center shadow-md">
                <button onclick="location.reload()" class="bg-indigo-500 text-xs py-1 px-3 rounded-lg font-bold">🏠 放棄冒險</button>
                <div class="flex flex-col items-center">
                    <span id="display-name" class="font-black text-yellow-300">英雄：...</span>
                    <span id="game-timer" class="font-mono text-xl text-white bg-indigo-900/50 px-3 py-1 rounded-full mt-1">00:00</span>
                </div>
                <span id="game-score" class="font-black text-2xl text-yellow-400">0</span>
            </div>
            <div class="p-6">
                <div id="section-header" class="text-xl font-bold text-slate-700 mb-4 border-b pb-2 flex justify-between">
                    <div><span id="section-icon" class="mr-2 text-2xl"></span><span id="section-title">載入中...</span></div>
                    <div id="progress-bar" class="text-indigo-400 font-black">進度：0 / 30</div>
                </div>
                <div id="question-container" class="min-h-[380px] flex flex-col justify-center items-center"></div>
                <div id="feedback-area" class="mt-4 p-5 rounded-2xl hidden border-l-[10px] transition-all shadow-md"></div>
                <div class="mt-8 flex justify-center pt-6 border-t">
                    <button id="next-btn" onclick="handleAction()" class="hidden bg-green-600 text-white px-12 py-4 rounded-2xl font-black text-xl shadow-[0_6px_0_0_#15803d]">下一題 ➔</button>
                </div>
            </div>
        </div>

        <!-- 結果畫面 -->
        <div id="result-screen" class="hidden p-12 text-center">
            <div class="text-8xl mb-6">👑</div>
            <h2 class="text-4xl font-black text-indigo-700 mb-2">冒險完成！</h2>
            <div id="final-stats" class="text-2xl mb-8 font-bold text-slate-600 bg-slate-50 p-6 rounded-3xl inline-block"></div>
            <button onclick="location.reload()" class="bg-indigo-600 text-white px-12 py-5 rounded-2xl font-black text-2xl block mx-auto">重新挑戰</button>
        </div>
    </div>

    <script>
        // 題庫數據與邏輯 (簡化版以確保穩定運行)
        const MASTER_DATA_POOL = {
            section1: [
                { q: "「 」有；「 」慎", options: ["僅", "謹"], ans: [0, 1], hint: "人(亻)旁的「僅」表示少；言(言)旁的「謹」表示說話小心。" },
                { q: "敏「 」；「 」毛", options: ["捷", "睫"], ans: [0, 1], hint: "手(扌)部「捷」指快；目(目)部「睫」指睫毛。" },
                { q: "感「 」；「 」費", options: ["激", "繳"], ans: [0, 1], hint: "水(氵)部「激」發；糸(糸)部「繳」費跟錢、線有關。" }
                // ...此處省略其餘題庫以節省空間，正式版可自行補足
            ],
            section2: [], section3: [] // 同理
        };

        let gameState = { playerName: "", score: 0, startTime: 0, currentIndex: 0, questions: [], currentSelections: [] };

        function startGame() {
            const name = document.getElementById('player-name').value.trim();
            if (!name) return alert("請輸入名字！");
            gameState.playerName = name;
            gameState.questions = [...MASTER_DATA_POOL.section1].sort(()=>0.5-Math.random()).slice(0,5);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('display-name').innerText = `英雄：${name}`;
            gameState.startTime = Date.now();
            showQuestion();
        }

        function showQuestion() {
            const q = gameState.questions[gameState.currentIndex];
            document.getElementById('progress-bar').innerText = `進度：${gameState.currentIndex + 1} / ${gameState.questions.length}`;
            document.getElementById('feedback-area').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            
            let dzIdx = 0;
            const formatted = q.q.replace(/「 」/g, () => `<div id="dz-${dzIdx++}" ondragover="event.preventDefault()" ondrop="drop(event, ${dzIdx-1})" class="drop-zone">?</div>`);
            
            const container = document.getElementById('question-container');
            container.innerHTML = `
                <div class="text-3xl font-bold mb-8">${formatted}</div>
                <div class="flex gap-4">
                    ${q.options.map((opt, i) => `<div draggable="true" ondragstart="drag(event, ${i})" class="option-card bg-white border-2 p-4 rounded-xl text-2xl shadow">${opt}</div>`).join('')}
                </div>
                <button onclick="checkAnswer()" class="mt-8 bg-indigo-600 text-white px-8 py-2 rounded-full font-bold">送出答案</button>
            `;
        }

        function drag(ev, i) { ev.dataTransfer.setData("idx", i); }
        function drop(ev, zIdx) {
            ev.preventDefault();
            const optIdx = ev.dataTransfer.getData("idx");
            const q = gameState.questions[gameState.currentIndex];
            const zone = document.getElementById(`dz-${zIdx}`);
            zone.innerText = q.options[optIdx];
            zone.classList.add('filled');
            gameState.currentSelections[zIdx] = parseInt(optIdx);
        }

        function checkAnswer() {
            const q = gameState.questions[gameState.currentIndex];
            let correct = true;
            q.ans.forEach((a, i) => { if(gameState.currentSelections[i] !== a) correct = false; });

            const fb = document.getElementById('feedback-area');
            fb.classList.remove('hidden');
            if(correct) {
                gameState.score += 10;
                fb.className = "mt-4 p-5 rounded-2xl bg-green-100 text-green-800 border-l-[10px] border-green-500";
                fb.innerHTML = "✨ 答對了！太棒了！";
                document.getElementById('next-btn').classList.remove('hidden');
            } else {
                fb.className = "mt-4 p-5 rounded-2xl bg-orange-100 text-orange-800 border-l-[10px] border-orange-500";
                fb.innerHTML = `🧐 提示：${q.hint}`;
            }
            document.getElementById('game-score').innerText = gameState.score;
        }

        function handleAction() {
            gameState.currentIndex++;
            if(gameState.currentIndex < gameState.questions.length) showQuestion();
            else {
                document.getElementById('game-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                document.getElementById('final-stats').innerText = `${gameState.playerName} 獲得 ${gameState.score} 分！`;
            }
        }
    </script>
</body>
</html>
